const colors=['c1','c2','c3','c4','c5','c6','c7'];
function ini(n){return n.replace(/^(Mr\.?|Mrs?\.?|Ms\.?|Dr\.?|Miss)\s*/i,'').split(' ').filter(w=>w).map(w=>w[0]).join('').toUpperCase().substring(0,2)}
function ac(n){let h=0;for(let i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return colors[Math.abs(h)%colors.length]}
function getState(){try{return JSON.parse(localStorage.getItem('ns26')||'{}');}catch(e){return {};}}
function saveState(s){localStorage.setItem('ns26',JSON.stringify(s));}
function isMet(name){return !!getState()[name]?.met;}
function toggleMet(name){const s=getState();if(!s[name])s[name]={};s[name].met=!s[name].met;saveState(s);render();}
function getNote(name){return getState()[name]?.note||'';}
function saveNote(name,note){const s=getState();if(!s[name])s[name]={};s[name].note=note;saveState(s);const el=document.getElementById('ns-'+name.replace(/[^a-zA-Z0-9]/g,''));if(el){el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1500);}}

if(af==='bk')return c.ind==='banking';

if(af==='hr')return c.tags&&c.tags.includes('hiring');
if(af==='p2')return c.tags&&c.tags.includes('p200');
if(af==='met')return !!state[c.n]?.met;
return true;
});

  :(c.img?'<img class="big-photo" src="'+c.img+'" onerror="this.outerHTML=\'<div class=big-ph>'+i+'</div>\'" loading="lazy">'
  :'<div class="big-ph '+a+'">'+i+'</div><a class="find-face" href="https://www.google.com/search?tbm=isch&q='+encodeURIComponent(c.n+' '+c.c)+'" target="_blank" onclick="event.stopPropagation()">Find Face on Google</a>');
const metBtnClass=isMet(c.n)?'met-btn active':'met-btn';
const metBtnText=isMet(c.n)?'<span class="met-icon">\u2714</span> Met':'<span class="met-icon">\u{1F44B}</span> Mark as Met';

dosContent=`
${c.d.co?'<div class="dl">Company</div><div class="dt">'+c.d.co+'</div>':''}
${c.d.p?'<div class="dl">Pays $200K+?</div><div class="dt">'+c.d.p+'</div>':''}
${c.d.h?'<div class="dl">Hiring?</div><div class="dt">'+c.d.h+'</div>':''}
${c.d.per?'<div class="dl">About Them</div><div class="dt">'+c.d.per+'</div>':''}
${c.d.hook?'<div class="dl">Conversation Hook</div><div class="dt hk">'+c.d.hook+'</div>':''}
`}else{
dosContent=`
<div class="dl">Role</div><div class="dt">${c.t}${c.c?', '+c.c:''}</div>

<div class="dl">Company Type</div><div class="dt">${(c.sz||'?')} ${(c.ind||'?')}</div>

return `<div class="cd ${tc}${metClass}" data-name="${c.n}" onclick="this.classList.toggle('ex')">
<span class="met-dot"></span>
<div class="av ${hasImg?'':a}">${avHtml}</div>
<div class="ci">

<div class="cc">${c.c}</div>
<div class="tg">${tags}</div>
${c.sc?'<div class="sb2"><div class="sf" style="width:'+c.sc+'%"></div></div>':''}
<div class="ds" onclick="event.stopPropagation()">

<div class="act-row">

</div>
<div class="notes-wrap">

}
sEl.addEventListener('input',render);

});

document.querySelectorAll('.tab').forEach(t=>{

// GOALS
const DAYS=[
{id:'tue',title:'Tuesday',date:'Mar 24',sub:'Welcome Reception — casual networking, get the lay of the land'},
{id:'wed',title:'Wednesday',date:'Mar 25',sub:'Sessions Day 1 — attend keynotes, targeted intros between sessions'},
{id:'thu',title:'Thursday',date:'Mar 26',sub:'Sessions Day 2 — deeper conversations, evening networking event'},
{id:'fri',title:'Friday',date:'Mar 27',sub:'Closing Event — relaxed setting, follow up on key conversations'},
];
function getGoals(){try{return JSON.parse(localStorage.getItem('ns26g')||'{}');}catch(e){return {};}}
function saveGoals(g){localStorage.setItem('ns26g',JSON.stringify(g));}
function renderGoals(){
const container=document.getElementById('goals-container');
const goals=getGoals();
container.innerHTML=DAYS.map(day=>{
const dg=goals[day.id]||[];
const done=dg.filter(g=>g.done).length;
const total=dg.length;
const pct=total?Math.round(done/total*100):0;
return `<div class="day-card">
<div class="day-hdr"><div class="day-title">${day.title}</div><div class="day-date">${day.date}${total?' &bull; '+done+'/'+total:''}</div></div>
<div class="day-subtitle">${day.sub}</div>
<ul class="goal-list" id="gl-${day.id}">
${dg.map((g,i)=>`<li class="goal-item">
<div class="goal-check${g.done?' done':''}" onclick="toggleGoal('${day.id}',${i})">${g.done?'\u2714':''}</div>
<textarea class="goal-text${g.done?' done':''}" rows="1" placeholder="Add a goal..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';updateGoalText('${day.id}',${i},this.value)">${g.text||''}</textarea>
</li>`).join('')}
</ul>
<div class="add-goal" onclick="addGoal('${day.id}')">+ Add goal</div>
${total?'<div class="day-progress"><div class="day-progress-fill" style="width:'+pct+'%"></div></div>':''}
</div>`;
}).join('');
}
function addGoal(dayId){const g=getGoals();if(!g[dayId])g[dayId]=[];g[dayId].push({text:'',done:false});saveGoals(g);renderGoals();const list=document.getElementById('gl-'+dayId);const ta=list?.querySelectorAll('.goal-text');if(ta&&ta.length)ta[ta.length-1].focus();}
function toggleGoal(dayId,idx){const g=getGoals();if(g[dayId]&&g[dayId][idx]){g[dayId][idx].done=!g[dayId][idx].done;saveGoals(g);renderGoals();}}
function updateGoalText(dayId,idx,text){const g=getGoals();if(g[dayId]&&g[dayId][idx]){g[dayId][idx].text=text;saveGoals(g);}}

// SETTINGS GEAR
function toggleGear(){
const menu=document.getElementById('gear-menu');
menu.classList.toggle('open');
}
document.addEventListener('click',function(e){
const menu=document.getElementById('gear-menu');
const btn=document.getElementById('gear-btn');
if(menu&&btn&&!menu.contains(e.target)&&!btn.contains(e.target)){menu.classList.remove('open');}
});

// BACKUP EXPORT/IMPORT
function exportBackup(){
const data={
ns26:JSON.parse(localStorage.getItem('ns26')||'{}'),
ns26g:JSON.parse(localStorage.getItem('ns26g')||'{}'),
exported:new Date().toISOString()
};
const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;a.download='nexus-summit-backup-'+new Date().toISOString().slice(0,10)+'.json';
a.click();URL.revokeObjectURL(url);
const msg=document.getElementById('backup-msg');
msg.textContent='Backup saved!';msg.classList.add('show');
setTimeout(()=>{msg.classList.remove('show');document.getElementById('gear-menu').classList.remove('open');},1500);
}

function importBackup(){document.getElementById('backup-file').click();}

document.getElementById('backup-file').addEventListener('change',function(e){
const file=e.target.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=function(ev){
try{
const data=JSON.parse(ev.target.result);
if(data.ns26)localStorage.setItem('ns26',JSON.stringify(data.ns26));
if(data.ns26g)localStorage.setItem('ns26g',JSON.stringify(data.ns26g));
render();renderGoals();
const msg=document.getElementById('backup-msg');
const metCount=Object.values(data.ns26||{}).filter(v=>v.met).length;
const noteCount=Object.values(data.ns26||{}).filter(v=>v.note).length;
msg.textContent='Restored! '+metCount+' met, '+noteCount+' notes';
msg.classList.add('show');
setTimeout(()=>msg.classList.remove('show'),3000);
}catch(err){
const msg=document.getElementById('backup-msg');
msg.textContent='Error reading file';msg.style.color='#ef4444';
msg.classList.add('show');
setTimeout(()=>{msg.classList.remove('show');msg.style.color='';},3000);
}
};
reader.readAsText(file);
e.target.value='';
});

render();
renderGoals();
</script>
</body>
