<div class="dl">Company</div><div class="dt">${(c.sz||'?')} ${(c.ind||'?')}</div>
`}
return `<div class="cd ${tc}${metClass}" data-name="${c.n}" onclick="this.classList.toggle('ex')">
<span class="met-dot"></span>
<div class="av ${hasImg?'':a}">${avHtml}</div>
<div class="ci">
<div class="ct"><div class="cn">${c.n}</div><span class="cb ${bc}">${c.tier==='S'?'Domo':c.tier}${c.sc?' &middot; '+c.sc:''}</span></div>
<div class="cti">${c.t}</div>
<div class="cc">${c.c}</div>
<div class="tg">${tags}</div>
${c.sc?'<div class="sb2"><div class="sf" style="width:'+c.sc+'%"></div></div>':''}
<div class="ds" onclick="event.stopPropagation()">
<div class="photo-wrap">${bigPhoto}</div>
<div class="photo-name">${c.n}</div>
<div class="photo-role">${c.t}${c.c?'<br>'+c.c:''}</div>
<div style="text-align:center">
<button class="${metBtnClass}" onclick="toggleMet('${eName}')">${metBtnText}</button>
</div>
<div class="act-row">
<a class="act-btn li" href="${c.li||''}" target="_blank">LinkedIn</a>
${c.cw?'<a class="act-btn co" href="'+c.cw+'" target="_blank">Company</a>':''}
</div>
<div class="notes-wrap">
<div class="notes-label">Notes</div>
<textarea class="notes-input" placeholder="Quick notes..." rows="2" onblur="saveNote('${eName}',this.value)" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${savedNote}</textarea>
<div class="notes-saved" id="${noteId}">Saved</div>
</div>
${dosContent}
</div>

}).join('');
}
sEl.addEventListener('input',render);
document.querySelectorAll('.fb').forEach(b=>{

document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
b.classList.add('on');af=b.dataset.f;render();
});
});

// TABS
document.querySelectorAll('.tab').forEach(t=>{

// GOALS
const DAYS=[
{id:'tue',title:'Tuesday',date:'Mar 24',sub:'Welcome Party — casual networking, scope out the room'},
{id:'wed',title:'Wednesday',date:'Mar 25',sub:'Sessions Day 1 — targeted intros between sessions, evening reception'},
{id:'thu',title:'Thursday',date:'Mar 26',sub:'Sessions Day 2 — deeper conversations, evening networking party'},
{id:'fri',title:'Friday',date:'Mar 27',sub:'Top Golf — relaxed setting, close the loop on key contacts'},
];
function getGoals(){try{return JSON.parse(localStorage.getItem('dp26g')||'{}');}catch(e){return {};}}
function saveGoals(g){localStorage.setItem('dp26g',JSON.stringify(g));}
function renderGoals(){
const container=document.getElementById('goals-container');
const goals=getGoals();
container.innerHTML=DAYS.map(day=>{
const dg=goals[day.id]||[];
const done=dg.filter(g=>g.done).length;
const total=dg.length;
const pct=total?Math.round(done/total*100):0;
return `<div class="day-card">
<div class="day-hdr"><div class="day-title">${day.title}</div><div class="day-date">${day.date}${total?' &bull; '+done+'/'+total:''}</div></div>
<div class="day-subtitle">${day.sub}</div>
<ul class="goal-list" id="gl-${day.id}">
${dg.map((g,i)=>`<li class="goal-item">
<div class="goal-check${g.done?' done':''}" onclick="toggleGoal('${day.id}',${i})">${g.done?'\u2714':''}</div>
<textarea class="goal-text${g.done?' done':''}" rows="1" placeholder="Add a goal..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';updateGoalText('${day.id}',${i},this.value)">${g.text||''}</textarea>
</li>`).join('')}
</ul>
<div class="add-goal" onclick="addGoal('${day.id}')">+ Add goal</div>
${total?'<div class="day-progress"><div class="day-progress-fill" style="width:'+pct+'%"></div></div>':''}
</div>`;
}).join('');
}
function addGoal(dayId){const g=getGoals();if(!g[dayId])g[dayId]=[];g[dayId].push({text:'',done:false});saveGoals(g);renderGoals();const list=document.getElementById('gl-'+dayId);const ta=list?.querySelectorAll('.goal-text');if(ta&&ta.length)ta[ta.length-1].focus();}
function toggleGoal(dayId,idx){const g=getGoals();if(g[dayId]&&g[dayId][idx]){g[dayId][idx].done=!g[dayId][idx].done;saveGoals(g);renderGoals();}}
function updateGoalText(dayId,idx,text){const g=getGoals();if(g[dayId]&&g[dayId][idx]){g[dayId][idx].text=text;saveGoals(g);}}

// SETTINGS GEAR
function toggleGear(){
const menu=document.getElementById('gear-menu');
menu.classList.toggle('open');
}
document.addEventListener('click',function(e){
const menu=document.getElementById('gear-menu');
const btn=document.getElementById('gear-btn');
if(menu&&btn&&!menu.contains(e.target)&&!btn.contains(e.target)){menu.classList.remove('open');}
});

// BACKUP EXPORT/IMPORT
function exportBackup(){
const data={
dp26:JSON.parse(localStorage.getItem('dp26')||'{}'),
dp26g:JSON.parse(localStorage.getItem('dp26g')||'{}'),
exported:new Date().toISOString()
};
const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;a.download='domopalooza-backup-'+new Date().toISOString().slice(0,10)+'.json';
a.click();URL.revokeObjectURL(url);
const msg=document.getElementById('backup-msg');
msg.textContent='Backup saved!';msg.classList.add('show');
setTimeout(()=>{msg.classList.remove('show');document.getElementById('gear-menu').classList.remove('open');},1500);
}

function importBackup(){document.getElementById('backup-file').click();}

document.getElementById('backup-file').addEventListener('change',function(e){
const file=e.target.files[0];if(!file)return;
const reader=new FileReader();
reader.onload=function(ev){
try{
const data=JSON.parse(ev.target.result);
if(data.dp26)localStorage.setItem('dp26',JSON.stringify(data.dp26));
if(data.dp26g)localStorage.setItem('dp26g',JSON.stringify(data.dp26g));
render();renderGoals();
const msg=document.getElementById('backup-msg');
const metCount=Object.values(data.dp26||{}).filter(v=>v.met).length;
const noteCount=Object.values(data.dp26||{}).filter(v=>v.note).length;
msg.textContent='Restored! '+metCount+' met, '+noteCount+' notes';
msg.classList.add('show');
setTimeout(()=>msg.classList.remove('show'),3000);
}catch(err){
const msg=document.getElementById('backup-msg');
msg.textContent='Error reading file';msg.style.color='#ef4444';
msg.classList.add('show');
setTimeout(()=>{msg.classList.remove('show');msg.style.color='';},3000);
}
};
reader.readAsText(file);
e.target.value='';
});

render();
renderGoals();
</script>
</body>
</html>
